interface:
  display_name: "YouTube to WeChat"
  short_description: "把视频、网页、PDF 和文本整理成可发布的微信公众号文章"
  default_prompt: "Use $youtube-to-wechat to turn this source into a polished WeChat article."
dependencies:
  tools:
    - type: "mcp"
      value: "chrome-devtools"
      description: "Browser automation for webpage extraction, YouTube transcript fallback, video screenshots, and rendered HTML images."
    - type: "mcp"
      value: "notion"
      description: "Optional publishing workflow for creating Notion pages and uploading article blocks."
